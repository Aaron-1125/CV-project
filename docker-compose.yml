name: bytedance-cv

services:
  cv:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bytedance-cv:stage1
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: python docker/verify_environment.py

  jupyter:
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bytedance-cv:stage1
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8888:8888"
    command: >
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=bytedance-cv
